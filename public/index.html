<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk STK Push Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { max-width: 900px; margin: 20px auto; }
        textarea { width: 100%; height: 120px; font-family: monospace; }
        .grid { display: flex; gap: 20px; }
        .grid div { flex: 1; }
        .status-table { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>🚀 Bulk M-Pesa STK Push</h2>
    
    <form id="pushForm">
        <label for="phoneNumbers">Phone Numbers (One per line, format: 2547XXXXXXXX):</label>
        <textarea id="phoneNumbers" placeholder="254712345678&#10;254722345678" required></textarea>

        <div class="grid">
            <div>
                <label for="amount">Amount (KES):</label>
                <input type="number" id="amount" min="10" placeholder="100" required>
            </div>
            <div>
                <label for="reference">Reference Prefix:</label>
                <input type="text" id="reference" placeholder="BulkOrder" required>
            </div>
        </div>
        <button type="submit" style="margin-top: 15px; width: 100%;">Fire Bulk STK Push Requests</button>
    </form>

    <hr>

    <h3>📊 Live Activity Logs</h3>
    <table class="status-table">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Phone Number</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            <tr><td colspan="4" style="text-align:center;">No requests sent yet.</td></tr>
        </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
